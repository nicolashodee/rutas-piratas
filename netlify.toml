[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--no-audit --no-fund"

[functions]
  node_bundler = "esbuild"

# /api/* → Netlify Functions (doit passer avant le fallback SPA)
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
  force = true

# SPA fallback : toute route inconnue renvoie index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Context-specific logs : plus verbeux sur les deploy previews pour debug
[context.deploy-preview.environment]
  VITE_DEBUG = "true"

[context.branch-deploy.environment]
  VITE_DEBUG = "true"
